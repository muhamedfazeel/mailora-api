name: Build Check

on:
  push:
    branches: [dev, stg, release]
  pull_request:
    branches: [dev, stg, release]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ vars.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build
